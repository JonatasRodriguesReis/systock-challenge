version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: systock-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-systock_db}
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - systock-network

  backend-app:
    build:
      context: ./backend
      dockerfile: ./docker/php.dockerfile
    container_name: systock-api
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
    entrypoint: ./docker/entrypoint.sh
    networks:
      - systock-network

  # Servidor Web do Backend (Nginx para PHP)
  backend-web:
    image: nginx:alpine
    container_name: systock-api-web
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend-app
    networks:
      - systock-network

  # Frontend (Vue.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: systock-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend-web
    networks:
      - systock-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: systock-pgadmin
    ports:
      - "15432:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db
    networks:
      - systock-network

networks:
  systock-network:
    driver: bridge

volumes:
  pgdata:
